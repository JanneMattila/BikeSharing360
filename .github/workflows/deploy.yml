name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SOLUTION_PATH: PublicWeb/BikeSharing.Web.sln
  PROJECT_PATH: PublicWeb/src/BikeSharing.Web/BikeSharing.Web.csproj
  PUBLISH_PATH: PublicWeb/src/BikeSharing.Web/obj/Release/Package/PackageTmp

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild
        shell: pwsh
        run: |
          $msbuildPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          Write-Output "MSBuild found at: $msbuildPath"
          Split-Path $msbuildPath >> $env:GITHUB_PATH

      - name: Setup NuGet
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile "${{ runner.temp }}\nuget.exe"
          "${{ runner.temp }}" >> $env:GITHUB_PATH

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: msbuild ${{ env.PROJECT_PATH }} /p:Configuration=Release /p:DeployOnBuild=true /p:PublishUrl="${{ env.PUBLISH_PATH }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-app
          path: ${{ env.PUBLISH_PATH }}

  deploy-staging:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: windows-latest
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app
          path: web-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: web-app

  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: windows-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: web-app
          path: web-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          package: web-app
